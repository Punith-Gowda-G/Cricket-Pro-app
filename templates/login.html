<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Cricket Pro</title>
  <meta name="description" content="Sign in to Cricket Pro live scorecard.">
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="justify-content:center;">

  <div class="login-wrap">
    <div class="login-brand">
      <div style="font-size:3rem;">🏏</div>
      <h1>Cricket Pro</h1>
      <p>Your live scorecard companion</p>
    </div>

    <div class="login-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="showForm('login')">Sign In</div>
        <div class="auth-tab" id="tab-reg" onclick="showForm('register')">Register</div>
      </div>

      <!-- Login -->
      <form id="form-login" class="auth-form active" action="/login" method="POST">
        <input type="text"     name="username" class="auth-input" placeholder="Username" required autocomplete="username">
        <input type="password" name="password" class="auth-input" placeholder="Password" required autocomplete="current-password">
        <button type="submit" class="auth-submit">Sign In</button>
      </form>

      <!-- Register -->
      <form id="form-reg" class="auth-form" action="/register" method="POST">
        <input type="text"     name="username" class="auth-input" placeholder="Choose Username" required autocomplete="username">
        <input type="password" name="password" class="auth-input" placeholder="Create Password" required autocomplete="new-password">
        <button type="submit" class="auth-submit">Create Account</button>
      </form>
    </div>

    <p style="font-size:.75rem; color:var(--muted); text-align:center;">
      Cricket Pro &copy; 2026 &nbsp;·&nbsp; Local Scoring System
    </p>
  </div>

  <script>
    function showForm(type) {
      ['login', 'register'].forEach(t => {
        document.getElementById(`form-${t === 'login' ? 'login' : 'reg'}`).classList.remove('active');
        document.getElementById(`tab-${t === 'login' ? 'login' : 'reg'}`).classList.remove('active');
      });
      if (type === 'login') {
        document.getElementById('form-login').classList.add('active');
        document.getElementById('tab-login').classList.add('active');
      } else {
        document.getElementById('form-reg').classList.add('active');
        document.getElementById('tab-reg').classList.add('active');
      }
    }
  </script>

</body>
</html>
